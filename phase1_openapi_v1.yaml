openapi: 3.0.3
info:
  title: Hybrid Fleet Platform API - Phase 1
  version: 1.0.0
  description: "Phase 1 OpenAPI draft aligned to SA / PRD / SD. Scope: Fleet Management Core + Dispatch Compliance Core."
servers:
  - url: https://api.example.com
    description: Production
  - url: https://sandbox-api.example.com
    description: Sandbox
security:
  - BearerAuth: []
tags:
  - name: Auth
    description: Identity, MFA, token, principal
  - name: PassengerOrders
    description: Passenger App/Web owned orders
  - name: TenantBookings
    description: Tenant/partner bookings
  - name: TenantDirectory
    description: Passengers, address books, tenant users/roles
  - name: TenantWebhooks
    description: Tenant API keys and webhook endpoints
  - name: TenantBilling
    description: Tenant billing profile and invoices
  - name: CallCenter
    description: CTI, call sessions, phone orders, callbacks
  - name: Dispatch
    description: Dispatch jobs, ETA, assignment, queue
  - name: Forwarder
    description: Third-party platform adapter and forwarded orders
  - name: Driver
    description: Driver App tasks, shifts, earnings, payouts
  - name: Operations
    description: Ops dashboard, revenue, maintenance, incidents
  - name: RegulatoryVehicles
    description: Vehicles, exclusivity, placards
  - name: RegulatoryDrivers
    description: Drivers, certifications, training
  - name: Contracts
    description: Vehicle contracts and service scope
  - name: Insurance
    description: Insurance policies
  - name: Complaints
    description: Complaint cases and dispute workflow
  - name: DriverBilling
    description: Driver fee plans, statements, reimbursements
  - name: PublicDisclosure
    description: Public info CMS and placards
  - name: Reports
    description: Reports and exports
  - name: FilingPackages
    description: Regulatory filing package generation
  - name: Notifications
    description: Notifications and subscriptions
  - name: Audit
    description: Immutable audit log
  - name: AdminTenants
    description: Platform tenant governance
  - name: AdminUsers
    description: Platform users and roles
  - name: AdminPricing
    description: Pricing/split template governance
  - name: AdminPayments
    description: Payments/acquiring governance
  - name: AdminSwitchboard
    description: External route/switchboard governance
  - name: AdminFlags
    description: Feature flags and rollout controls
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TenantApiKey:
      type: apiKey
      in: header
      name: X-API-Key
    WebhookSignature:
      type: apiKey
      in: header
      name: X-Signature
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VehicleId:
      name: vehicleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DriverId:
      name: driverId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CaseNo:
      name: caseNo
      in: path
      required: true
      schema:
        type: string
    CallId:
      name: callId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportJobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PackageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  headers:
    RequestId:
      schema:
        type: string
      description: Traceable request id
    IdempotencyKey:
      schema:
        type: string
      description: Idempotent request key
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AcceptedJob:
      description: Accepted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AsyncJobAccepted"
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        requestId:
          type: string
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    AsyncJobAccepted:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
            - running
        pollUrl:
          type: string
        webhookExpected:
          type: boolean
    Principal:
      type: object
      properties:
        principalId:
          type: string
          format: uuid
        realm:
          type: string
          enum:
            - admin
            - tenant
            - driver
            - ops
        tenantId:
          type: string
          format: uuid
          nullable: true
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
    TokenResponse:
      type: object
      required:
        - accessToken
        - expiresIn
        - principal
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        mfaRequired:
          type: boolean
          default: false
        principal:
          $ref: "#/components/schemas/Principal"
    Address:
      type: object
      properties:
        addressText:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        placeId:
          type: string
        manualGeocode:
          type: boolean
          default: false
    Passenger:
      type: object
      properties:
        passengerId:
          type: string
          format: uuid
        fullName:
          type: string
        employeeNo:
          type: string
        departmentName:
          type: string
        mobile:
          type: string
        email:
          type: string
          format: email
        activeFlag:
          type: boolean
    Order:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        orderNo:
          type: string
        orderDomain:
          type: string
          enum:
            - owned
            - forwarded
        orderSource:
          type: string
          enum:
            - phone
            - web
            - app
            - api
            - concierge
            - external_platform
        serviceBucket:
          type: string
          enum:
            - standard_taxi
            - business_dispatch
            - av_pilot
        dispatchSemantics:
          type: string
          enum:
            - realtime
            - reservation
            - queue
            - forwarder_broadcast
        tenantId:
          type: string
          format: uuid
          nullable: true
        pickup:
          $ref: "#/components/schemas/Address"
        dropoff:
          $ref: "#/components/schemas/Address"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        currentStatus:
          type: string
        etaMinutes:
          type: integer
          nullable: true
        callId:
          type: string
          format: uuid
          nullable: true
        recordingId:
          type: string
          nullable: true
    OrderCreateRequest:
      type: object
      required:
        - pickup
        - dropoff
        - passengerContact
      properties:
        pickup:
          $ref: "#/components/schemas/Address"
        dropoff:
          $ref: "#/components/schemas/Address"
        scheduledAt:
          type: string
          format: date-time
        productHint:
          type: string
        specialRequirements:
          type: array
          items:
            type: string
        paymentMethod:
          type: string
        passengerContact:
          type: object
          required:
            - name
            - mobile
          properties:
            name:
              type: string
            mobile:
              type: string
            email:
              type: string
              format: email
        note:
          type: string
          maxLength: 500
    Booking:
      type: object
      properties:
        bookingId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        bookingType:
          type: string
          enum:
            - oneway
            - roundtrip
            - recurring
        reservationWindowStart:
          type: string
          format: date-time
        reservationWindowEnd:
          type: string
          format: date-time
        recurrenceRule:
          type: string
          nullable: true
        modifiableUntil:
          type: string
          format: date-time
          nullable: true
        cancelableUntil:
          type: string
          format: date-time
          nullable: true
    TenantBookingCreateRequest:
      type: object
      required:
        - scheduledAt
        - pickup
        - dropoff
        - passenger
        - bookingType
      properties:
        bookingType:
          type: string
          enum:
            - oneway
            - roundtrip
            - recurring
        scheduledAt:
          type: string
          format: date-time
        reservationWindowEnd:
          type: string
          format: date-time
        pickup:
          $ref: "#/components/schemas/Address"
        dropoff:
          $ref: "#/components/schemas/Address"
        passenger:
          oneOf:
            - type: object
              required:
                - passengerId
              properties:
                passengerId:
                  type: string
                  format: uuid
            - type: object
              required:
                - fullName
                - mobile
              properties:
                fullName:
                  type: string
                mobile:
                  type: string
                departmentName:
                  type: string
        vehicleForm:
          type: string
        costCenter:
          type: string
        partnerSubtype:
          type: string
          enum:
            - enterprise_dispatch
            - credit_card_airport_transfer
        onsiteContact:
          type: string
        flightRef:
          type: string
        note:
          type: string
          maxLength: 1000
    DispatchJob:
      type: object
      properties:
        dispatchJobId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        dispatchMode:
          type: string
          enum:
            - realtime
            - reservation
            - queue
            - forwarder
        status:
          type: string
        priorityScore:
          type: number
        serviceAreaCheckResult:
          type: string
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
    CandidateVehicle:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
          nullable: true
        plateNo:
          type: string
        driverName:
          type: string
          nullable: true
        distanceKm:
          type: number
        etaMinutes:
          type: integer
        dispatchable:
          type: boolean
        reasonIfRejected:
          type: string
          nullable: true
    AssignDispatchRequest:
      type: object
      required:
        - dispatchJobId
        - vehicleId
      properties:
        dispatchJobId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        manualOverrideReason:
          type: string
          maxLength: 500
    CallSession:
      type: object
      properties:
        callId:
          type: string
          format: uuid
        callType:
          type: string
          enum:
            - booking
            - complaint
            - callback
            - lost_and_found
            - general_inquiry
        callerPhone:
          type: string
        agentId:
          type: string
          format: uuid
          nullable: true
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
          nullable: true
        recordingId:
          type: string
          nullable: true
        linkedOrderId:
          type: string
          format: uuid
          nullable: true
        linkedCaseNo:
          type: string
          nullable: true
        agentIdentityAnnounced:
          type: boolean
    PhoneOrderCreateRequest:
      allOf:
        - $ref: "#/components/schemas/OrderCreateRequest"
        - type: object
          required:
            - callId
            - agentId
          properties:
            callId:
              type: string
              format: uuid
            agentId:
              type: string
              format: uuid
    ComplaintCase:
      type: object
      properties:
        caseNo:
          type: string
        caseSource:
          type: string
          enum:
            - phone
            - web
            - app
            - portal
            - internal
        relatedOrderId:
          type: string
          format: uuid
          nullable: true
        relatedCallId:
          type: string
          format: uuid
          nullable: true
        category:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        receivedAt:
          type: string
          format: date-time
        assigneeId:
          type: string
          format: uuid
          nullable: true
        slaDueAt:
          type: string
          format: date-time
        status:
          type: string
        resolutionCode:
          type: string
          nullable: true
        resolutionNote:
          type: string
          nullable: true
    ComplaintCreateRequest:
      type: object
      required:
        - caseSource
        - category
        - severity
      properties:
        caseSource:
          type: string
          enum:
            - phone
            - web
            - app
            - portal
            - internal
        relatedOrderId:
          type: string
          format: uuid
        relatedCallId:
          type: string
          format: uuid
        category:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        description:
          type: string
          maxLength: 2000
    Vehicle:
      type: object
      properties:
        vehicleId:
          type: string
          format: uuid
        plateNo:
          type: string
        vin:
          type: string
        vehicleForm:
          type: string
          enum:
            - sedan
            - wagon
            - mpv
            - accessible
            - other
        licenseClass:
          type: string
          enum:
            - taxi
            - rental
            - multi_taxi
            - other
        energyType:
          type: string
          enum:
            - fuel
            - ev
            - hybrid
            - other
        operatingAreaId:
          type: string
          format: uuid
        dispatchableFlag:
          type: boolean
        currentStatus:
          type: string
        latestReviewStatus:
          type: string
    VehicleCreateRequest:
      type: object
      required:
        - plateNo
        - vin
        - vehicleForm
        - licenseClass
        - operatingAreaId
      properties:
        plateNo:
          type: string
        vin:
          type: string
        vehicleForm:
          type: string
          enum:
            - sedan
            - wagon
            - mpv
            - accessible
            - other
        licenseClass:
          type: string
          enum:
            - taxi
            - rental
            - multi_taxi
            - other
        energyType:
          type: string
          enum:
            - fuel
            - ev
            - hybrid
            - other
        operatingAreaId:
          type: string
          format: uuid
        ownerPartnerId:
          type: string
          format: uuid
        dispatchPartnerId:
          type: string
          format: uuid
        serviceTags:
          type: array
          items:
            type: string
    Driver:
      type: object
      properties:
        driverId:
          type: string
          format: uuid
        name:
          type: string
        mobile:
          type: string
        status:
          type: string
        boundVehicleId:
          type: string
          format: uuid
          nullable: true
        serviceRating:
          type: number
        complaintCount:
          type: integer
    DriverCreateRequest:
      type: object
      required:
        - name
        - mobile
      properties:
        name:
          type: string
        mobile:
          type: string
        occupationalLicenseNo:
          type: string
        occupationalLicenseExpiry:
          type: string
          format: date
        taxiRegistrationNo:
          type: string
        taxiRegistrationExpiry:
          type: string
          format: date
        boundVehicleId:
          type: string
          format: uuid
    VehicleContract:
      type: object
      properties:
        contractId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        partnerId:
          type: string
          format: uuid
        partnerType:
          type: string
        contractType:
          type: string
        serviceScope:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
    InsurancePolicy:
      type: object
      properties:
        policyId:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        policyNo:
          type: string
        insuranceType:
          type: string
        insurerName:
          type: string
        coverageAmount:
          type: number
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string
    DriverTask:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        serviceBucket:
          type: string
        status:
          type: string
        pickup:
          $ref: "#/components/schemas/Address"
        dropoff:
          $ref: "#/components/schemas/Address"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        etaMinutes:
          type: integer
          nullable: true
        sourceBadge:
          type: string
    TaskActionResponse:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        status:
          type: string
        updatedAt:
          type: string
          format: date-time
    Incident:
      type: object
      properties:
        incidentId:
          type: string
          format: uuid
        source:
          type: string
          enum:
            - driver
            - ops
            - system
        vehicleId:
          type: string
          format: uuid
        type:
          type: string
        severity:
          type: string
        status:
          type: string
        description:
          type: string
    IncidentCreateRequest:
      type: object
      required:
        - vehicleId
        - type
        - severity
      properties:
        vehicleId:
          type: string
          format: uuid
        type:
          type: string
        severity:
          type: string
        description:
          type: string
        attachments:
          type: array
          items:
            type: string
            format: uri
    DriverStatement:
      type: object
      properties:
        statementId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        periodMonth:
          type: string
          pattern: ^\d{4}-\d{2}$
        grossEarning:
          type: number
        serviceFee:
          type: number
        subsidyAmount:
          type: number
        netAmount:
          type: number
        payoutStatus:
          type: string
    TenantInvoice:
      type: object
      properties:
        invoiceId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        amount:
          type: number
        status:
          type: string
        pdfUrl:
          type: string
          format: uri
          nullable: true
    Notification:
      type: object
      properties:
        notificationId:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        link:
          type: string
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
    ReportJob:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        jobType:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
            - expired
        artifactUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
    ReportJobCreateRequest:
      type: object
      required:
        - jobType
        - format
      properties:
        jobType:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        format:
          type: string
          enum:
            - csv
            - xlsx
            - pdf
            - zip
        filters:
          type: object
          additionalProperties: true
        recipients:
          type: array
          items:
            type: string
            format: email
    FilingPackage:
      type: object
      properties:
        packageId:
          type: string
          format: uuid
        packageType:
          type: string
          enum:
            - filing
            - monthly_report
            - audit_request
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
        artifactZipUrl:
          type: string
          format: uri
          nullable: true
        artifactPdfUrl:
          type: string
          format: uri
          nullable: true
        generatedAt:
          type: string
          format: date-time
          nullable: true
    PublicInfoVersion:
      type: object
      properties:
        publicInfoVersionId:
          type: string
          format: uuid
        bookingPhone:
          type: string
        complaintPhone:
          type: string
        callRateText:
          type: string
        fareStandardText:
          type: string
        paymentMethodText:
          type: string
        status:
          type: string
          enum:
            - draft
            - published
            - retired
        effectiveFrom:
          type: string
          format: date-time
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      description: Login for admin/tenant/ops realms.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
                - password
              properties:
                loginId:
                  type: string
                password:
                  type: string
                rememberMe:
                  type: boolean
                  default: false
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/auth/mfa/verify:
    post:
      tags:
        - Auth
      summary: Verify MFA challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeId
                - otp
              properties:
                challengeId:
                  type: string
                otp:
                  type: string
                  pattern: ^\d{6}$
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/me:
    get:
      tags:
        - Auth
      summary: Get current principal
      responses:
        "200":
