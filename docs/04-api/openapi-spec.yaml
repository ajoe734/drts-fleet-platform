          type: string
        tenantId:
          type: string
        costCenterCode:
          type: string
          nullable: true
        periodKey:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
        dimension:
          type: string
          enum:
            - booking_count
            - amount_minor
        amount:
          type: integer
        entryType:
          type: string
