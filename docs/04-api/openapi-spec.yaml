            - approval
            - block
    TenantBookingQuotaImpactQuery:
      type: object
      required:
        - reservationWindowStart
      properties:
        bookingId:
          type: string
          nullable: true
        costCenterCode:
          type: string
          nullable: true
          description: Canonical cost-center field.
        costCenter:
          type: string
          nullable: true
          description: Compatibility alias accepted by the live service.
        estimatedAmountMinor:
          type: integer
          nullable: true
          description: Canonical estimated amount field.
        amountMinor:
          type: integer
          nullable: true
          description: Compatibility alias accepted by the live service.
        currency:
          type: string
        reservationWindowStart:
          type: string
          format: date-time
          description: Canonical field used for period attribution.
        tripStartsAt:
          type: string
          format: date-time
          description: Compatibility alias accepted by the live service.
        businessDispatchSubtype:
          type: string
          nullable: true
    TenantBookingQuotaImpactPreview:
      type: object
      required:
        - evaluationId
        - periodKey
        - impacts
        - combinedTriggered
      properties:
        evaluationId:
          type: string
        periodKey:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}$"
        impacts:
          type: array
          items:
            $ref: "#/components/schemas/TenantBookingQuotaImpactResult"
        combinedTriggered:
          type: string
          enum:
            - none
            - warn
            - approval
            - block
    TenantPrincipalRef:
      type: object
