<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>Ops Console · DRTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter", "Noto Sans TC", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0F172A"/>
  <rect x="14" y="22" width="72" height="56" rx="6" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <rect x="20" y="30" width="14" height="40" rx="2" fill="#E0F2FE"/>
  <circle cx="46" cy="48" r="3" fill="#0EA5E9"/>
  <circle cx="58" cy="42" r="3" fill="#0EA5E9"/>
  <circle cx="68" cy="56" r="3" fill="#F59E0B"/>
  <path d="M46 48 L58 42 L68 56" stroke="#0EA5E9" stroke-width="1.5" fill="none"/>
</svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="macos-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="mgmt-tokens.jsx"></script>
<script type="text/babel" src="mgmt-shell.jsx"></script>
<script type="text/babel" src="mgmt-data.jsx"></script>
<script type="text/babel" src="ops-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "density": "compact",
  "lang": "zh"
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const th = buildMgmtTheme({ console: 'ops', dark: tw.dark, density: tw.density });
  const W = 1440, H = 900;
  const Frame = ({ children, chrome, url }) => chrome
    ? <MacWindow title="Ops Console · DRTS" url={'https://ops.drts.io' + (url || '')} variant={tw.dark ? 'dark' : 'light'} width={W} height={H}>{children}</MacWindow>
    : <div style={{ width: W, height: H, background: th.bg, borderRadius: 10, overflow: 'hidden', border: '1px solid ' + th.border }}>{children}</div>;
  const Hero = ({ url, children }) => <Frame chrome url={url}>{children}</Frame>;
  const Bare = ({ children }) => <Frame>{children}</Frame>;

  return (
    <>
      <DesignCanvas projectName="Ops Console" subtitle="即時營運指揮 · 14 routes + dispatch / callcenter / incident 深入" accent="#0EA5E9">
        <DCSection id="overview" title="01 · 工作首頁" subtitle="當班總覽 + 待處理 + 健康訊號">
          <DCArtboard id="dashboard" label="營運總覽 Dashboard" width={W} height={H}><Hero url="/"><OC_Dashboard theme={th} /></Hero></DCArtboard>
        </DCSection>

        <DCSection id="dispatch-flow" title="02 · 即時派遣流程" subtitle="queue → owned → 候選詳情 / forwarded mirror">
          <DCArtboard id="dispatch-owned" label="Dispatch · Owned 自營" width={W} height={H}><Hero url="/dispatch"><OC_DispatchOwned theme={th} /></Hero></DCArtboard>
          <DCArtboard id="dispatch-detail" label="Dispatch detail · 候選 + gates" width={W} height={H}><Bare><OC_DispatchDetail theme={th} /></Bare></DCArtboard>
          <DCArtboard id="dispatch-forwarded" label="Dispatch · Forwarded mirror" width={W} height={H}><Bare><OC_DispatchForwarded theme={th} /></Bare></DCArtboard>
        </DCSection>

        <DCSection id="callcenter" title="03 · 客服中心" subtitle="call sessions · phone booking">
          <DCArtboard id="callcenter" label="Call sessions + phone booking" width={W} height={H}><Hero url="/callcenter"><OC_Callcenter theme={th} /></Hero></DCArtboard>
        </DCSection>

        <DCSection id="case-flow" title="04 · 案件處理流程" subtitle="客訴清單 → 事故 → SOS 詳情 / recovery">
          <DCArtboard id="complaints" label="客訴中心" width={W} height={H}><Bare><OC_Complaints theme={th} /></Bare></DCArtboard>
          <DCArtboard id="incidents" label="事故中心" width={W} height={H}><Bare><OC_Incidents theme={th} /></Bare></DCArtboard>
          <DCArtboard id="incident-detail" label="Incident detail · SOS" width={W} height={H}><Hero url="/incidents/inc_0214"><OC_IncidentDetail theme={th} /></Hero></DCArtboard>
        </DCSection>

        <DCSection id="monitor" title="05 · 營運監控">
          <DCArtboard id="reports" label="報表 Reports" width={W} height={H}><Bare><OC_Reports theme={th} /></Bare></DCArtboard>
          <DCArtboard id="revenue" label="收益審視 Revenue" width={W} height={H}><Bare><OC_Revenue theme={th} /></Bare></DCArtboard>
          <DCArtboard id="attendance" label="班次與出勤" width={W} height={H}><Bare><OC_Attendance theme={th} /></Bare></DCArtboard>
          <DCArtboard id="maintenance" label="車輛保修" width={W} height={H}><Bare><OC_Maintenance theme={th} /></Bare></DCArtboard>
        </DCSection>

        <DCSection id="master" title="06 · 主資料">
          <DCArtboard id="drivers" label="司機 Drivers" width={W} height={H}><Bare><OC_Drivers theme={th} /></Bare></DCArtboard>
          <DCArtboard id="vehicles" label="車輛 Vehicles" width={W} height={H}><Bare><OC_Vehicles theme={th} /></Bare></DCArtboard>
          <DCArtboard id="contracts" label="合約 Contracts" width={W} height={H}><Bare><OC_Contracts theme={th} /></Bare></DCArtboard>
          <DCArtboard id="flags" label="功能旗標 (only-read)" width={W} height={H}><Bare><OC_Flags theme={th} /></Bare></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakToggle label="深色模式" value={tw.dark} onChange={v => setTweak('dark', v)} />
          <TweakRadio label="密度" value={tw.density} onChange={v => setTweak('density', v)} options={[{ value: 'compact', label: 'Compact' }, { value: 'comfy', label: 'Comfy' }]} />
          <TweakRadio label="語言" value={tw.lang} onChange={v => setTweak('lang', v)} options={[{ value: 'zh', label: '繁中' }, { value: 'en', label: 'EN' }]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
