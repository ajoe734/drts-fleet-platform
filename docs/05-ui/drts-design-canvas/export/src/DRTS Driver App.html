<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DRTS Driver App · Multi-Platform Designs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; background: #f0eee9; }
  body { overflow: hidden; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="driver-screens-1.jsx"></script>
<script type="text/babel" src="driver-screens-2.jsx"></script>
<script type="text/babel" src="driver-screens-3.jsx"></script>
<script type="text/babel" src="mgmt-screens.jsx"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0F1B2D"/>
  <rect x="30" y="20" width="40" height="60" rx="6" fill="#F0EEE9" stroke="#2A6FDB" stroke-width="2"/>
  <rect x="36" y="30" width="28" height="4" rx="2" fill="#2A6FDB"/>
  <rect x="36" y="40" width="20" height="3" rx="1.5" fill="#94A3B8"/>
  <rect x="36" y="48" width="28" height="14" rx="3" fill="#E8F0FE"/>
  <circle cx="50" cy="72" r="3" fill="#2A6FDB"/>
</svg>
</template>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light"
}/*EDITMODE-END*/;

// Phone artboard helper
function Phone({ device = 'large', children, theme }) {
  const dims = device === 'narrow'
    ? { w: 360, h: 780 }
    : { w: 412, h: 892 };
  return (
    <AndroidDevice width={dims.w} height={dims.h} dark={theme.mode === 'dark'}>
      <div style={{ width: '100%', height: '100%', background: theme.bg, display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </AndroidDevice>
  );
}

// Phone frame WITHOUT android chrome (we render our own status bar)
// The AndroidDevice contains a status bar + nav bar already; for hi-fi
// we want our own status bar. So let's just use a simple phone bezel.
function PhoneBezel({ device = 'large', children, theme }) {
  const dims = device === 'narrow'
    ? { w: 360, h: 780 }
    : { w: 412, h: 892 };
  return (
    <div style={{
      width: dims.w, height: dims.h,
      borderRadius: 36,
      background: theme.bg,
      border: `9px solid ${theme.mode === 'dark' ? '#0A0E14' : '#1A1F2A'}`,
      boxShadow: theme.mode === 'dark'
        ? '0 30px 80px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.04)'
        : '0 30px 80px rgba(15,23,42,.18), inset 0 0 0 1px rgba(255,255,255,.6)',
      overflow: 'hidden',
      position: 'relative',
    }}>
      {/* punch hole */}
      <div style={{
        position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)',
        width: 22, height: 22, borderRadius: 11, background: '#0A0E14', zIndex: 10,
      }} />
      <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const dark = tw.theme === 'dark';
  const t = buildTheme(dark);

  // Each artboard renders one screen at the device frame size + a generous margin so the bezel isn't clipped.
  const sw = (W, content) => (
    <div style={{
      width: '100%', height: '100%',
      background: '#F0EEE9',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 16,
    }}>{content}</div>
  );

  const phone = (state, device = 'large') => (
    <PhoneBezel device={device} theme={t}>{state}</PhoneBezel>
  );

  return (
    <>
      <DesignCanvas minScale={0.1} maxScale={4}>

        {/* OVERVIEW */}
        <DCSection id="hero" title="DRTS · 多平台駕駛應用" subtitle="Driver app · Ops console · Platform admin · Hi-fi (繁體中文)">
          <DCArtboard id="cover" label="Brand cover" width={900} height={500}>
            <CoverArtboard theme={t} />
          </DCArtboard>
          <DCArtboard id="system" label="Design system" width={900} height={500}>
            <SystemArtboard theme={t} />
          </DCArtboard>
        </DCSection>

        {/* DRIVER FLOW: HERO PATH */}
        <DCSection id="hero-flow" title="Hero flow · 接收 → 接受 → 等候 → 確認"
          subtitle="SmartRides X 外部平台訂單的完整 race 流程，可點擊操作">
          <DCArtboard id="flow-1" label="1 · 任務佇列收到外部訂單" width={460} height={920}>
            {sw(412, phone(<ScreenInbox theme={t} />))}
          </DCArtboard>
          <DCArtboard id="flow-2" label="2 · 行程畫面 · 平台主導" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="forwarded_offered" />))}
          </DCArtboard>
          <DCArtboard id="flow-3" label="3 · 等待平台確認" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="forwarded_pending" />))}
          </DCArtboard>
          <DCArtboard id="flow-4" label="4 · 平台已確認" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="forwarded_confirmed" />))}
          </DCArtboard>
        </DCSection>

        {/* DRIVER · CORE SCREENS */}
        <DCSection id="driver-core" title="Driver app · 核心畫面"
          subtitle="10 條路徑全部覆蓋；A/B 變體並排比較。412×892 大型機。">

          <DCArtboard id="onboard-A" label="1 · 裝置啟用" width={460} height={920}>
            {sw(412, phone(<ScreenProvisioning theme={t} />))}
          </DCArtboard>
          <DCArtboard id="workspace-A" label="2A · 工作台 · Hero" width={460} height={920}>
            {sw(412, phone(<ScreenWorkspace theme={t} variant="A" />))}
          </DCArtboard>
          <DCArtboard id="workspace-B" label="2B · 工作台 · Stacked" width={460} height={920}>
            {sw(412, phone(<ScreenWorkspace theme={t} variant="B" />))}
          </DCArtboard>
          <DCArtboard id="inbox-A" label="3A · 任務 · Cards" width={460} height={920}>
            {sw(412, phone(<ScreenInbox theme={t} variant="A" />))}
          </DCArtboard>
          <DCArtboard id="inbox-B" label="3B · 任務 · Dense" width={460} height={920}>
            {sw(412, phone(<ScreenInbox theme={t} variant="B" />))}
          </DCArtboard>
          <DCArtboard id="trip-owned" label="4 · 行程 · 自營派單" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="owned_active" />))}
          </DCArtboard>
          <DCArtboard id="platform" label="5 · 平台連線" width={460} height={920}>
            {sw(412, phone(<ScreenPlatform theme={t} />))}
          </DCArtboard>
          <DCArtboard id="earnings" label="6 · 收入" width={460} height={920}>
            {sw(412, phone(<ScreenEarnings theme={t} />))}
          </DCArtboard>
          <DCArtboard id="shift" label="7 · 班次" width={460} height={920}>
            {sw(412, phone(<ScreenShift theme={t} />))}
          </DCArtboard>
          <DCArtboard id="sos" label="8 · SOS 求援" width={460} height={920}>
            {sw(412, phone(<ScreenSOS theme={t} />))}
          </DCArtboard>
          <DCArtboard id="settings" label="9 · 設定" width={460} height={920}>
            {sw(412, phone(<ScreenSettings theme={t} />))}
          </DCArtboard>
        </DCSection>

        {/* DRIVER · TERMINAL STATES */}
        <DCSection id="driver-states" title="Driver app · 行程終端狀態"
          subtitle="lost-race / cancelled / sync-failed 對應的駕駛安全文案">
          <DCArtboard id="lost" label="平台已分配給他人" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="forwarded_lost" />))}
          </DCArtboard>
          <DCArtboard id="sync-fail" label="同步異常 · 派車台處理" width={460} height={920}>
            {sw(412, phone(<ScreenTrip theme={t} state="sync_failed" />))}
          </DCArtboard>
        </DCSection>

        {/* NARROW DEVICE */}
        <DCSection id="narrow" title="窄機支援 · 360×780"
          subtitle="同樣的設計系統在 Android 入門機上的呈現">
          <DCArtboard id="n-workspace" label="工作台 · 360" width={400} height={820}>
            {sw(360, phone(<ScreenWorkspace theme={t} />, 'narrow'))}
          </DCArtboard>
          <DCArtboard id="n-inbox" label="任務 · 360" width={400} height={820}>
            {sw(360, phone(<ScreenInbox theme={t} />, 'narrow'))}
          </DCArtboard>
          <DCArtboard id="n-platform" label="平台 · 360" width={400} height={820}>
            {sw(360, phone(<ScreenPlatform theme={t} />, 'narrow'))}
          </DCArtboard>
        </DCSection>

        {/* MANAGEMENT */}
        <DCSection id="ops" title="Ops Console · 派車台後台"
          subtitle="外部訂單看板、轉接器健康度、人工 fallback 工作流程">
          <DCArtboard id="ops-board" label="外部訂單看板" width={1280} height={820}>
            <OpsForwardedBoard theme={t} />
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Platform Admin · 平台管理"
          subtitle="轉接器登記、認證狀態、政策與功能旗標">
          <DCArtboard id="adm-registry" label="轉接器登記" width={1280} height={920}>
            <AdminAdapterRegistry theme={t} />
          </DCArtboard>
        </DCSection>

      </DesignCanvas>

      {/* Tweaks panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="主題">
          <TweakRadio
            label="配色"
            value={tw.theme}
            options={[{ label: '淺色', value: 'light' }, { label: '深色', value: 'dark' }]}
            onChange={(v) => setTweak('theme', v)}
          />
        </TweakSection>
        <TweakSection title="說明">
          <div style={{ fontSize: 12, color: '#6b7280', lineHeight: 1.5 }}>
            點擊任一畫面右上角的展開鈕進入聚焦模式；←/→ 切換、Esc 退出。<br/>
            拖曳 grip 重新排序、雙擊標題改名。
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// ─── Cover artboard ────────────────────────────────────────────
function CoverArtboard({ theme: t }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      background: t.bg, color: t.text,
      padding: 48,
      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
      fontFamily: TYPE.family,
      borderRadius: 2,
    }}>
      <div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '6px 12px', background: t.surface, border: `1px solid ${t.border}`, borderRadius: 999, fontSize: 11, fontWeight: 700, color: t.brand, letterSpacing: 0.6, textTransform: 'uppercase' }}>
          <span style={{ width: 6, height: 6, borderRadius: 3, background: t.brand }} />
          Driver app · Multi-platform aggregation
        </div>
      </div>
      <div>
        <div style={{ fontSize: 64, fontWeight: 700, letterSpacing: -2, lineHeight: 1.0, color: t.text }}>
          一個應用
        </div>
        <div style={{ fontSize: 64, fontWeight: 700, letterSpacing: -2, lineHeight: 1.0, color: t.brand, marginTop: 4 }}>
          多平台派單
        </div>
        <div style={{ fontSize: 18, color: t.textMuted, marginTop: 18, maxWidth: 620, lineHeight: 1.5 }}>
          自營派單與外部平台（SmartRides X · Metro Hail）整合於同一駕駛工作流程。
          清楚的權威分層、安全的 race 狀態，與完整的派車台與管理後台。
        </div>
      </div>
      <div style={{ display: 'flex', gap: 24, alignItems: 'center', flexWrap: 'wrap' }}>
        <Stat theme={t} k="駕駛畫面" v="10" />
        <Stat theme={t} k="A/B 變體" v="4" />
        <Stat theme={t} k="管理畫面" v="2" />
        <Stat theme={t} k="行程狀態" v="7" />
        <Stat theme={t} k="主題" v="2" />
        <span style={{ flex: 1 }} />
        <span style={{ fontSize: 12, color: t.textDim, fontFamily: TYPE.mono }}>
          DRTS-MP · 2026/05/07
        </span>
      </div>
    </div>
  );
}

function Stat({ theme: t, k, v }) {
  return (
    <div>
      <div style={{ fontSize: 32, fontWeight: 700, color: t.text, letterSpacing: -0.8, fontFamily: TYPE.mono }}>{v}</div>
      <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginTop: 2 }}>{k}</div>
    </div>
  );
}

// ─── System artboard ───────────────────────────────────────────
function SystemArtboard({ theme: t }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      background: t.bg, color: t.text, padding: 36,
      fontFamily: TYPE.family, borderRadius: 2, overflow: 'auto',
    }}>
      <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.4, marginBottom: 18 }}>設計系統 · Design tokens</div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        <Card theme={t} padding={20}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Authority colors</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <Swatch theme={t} bg={t.ownedBg} fg={t.ownedFg} border={t.ownedBorder} k="Owned · 自營派單" v={t.ownedFg} />
            <Swatch theme={t} bg={t.forwardedBg} fg={t.forwardedFg} border={t.forwardedBorder} k="Forwarded · 外部平台" v={t.forwardedFg} />
            <Swatch theme={t} bg={t.brandBg} fg={t.brand} border={t.brand + '40'} k="Brand · DRTS" v={t.brand} />
          </div>
        </Card>

        <Card theme={t} padding={20}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Status</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            <Chip theme={t} tone="success" dot>已上線</Chip>
            <Chip theme={t} tone="info" dot>已廣播</Chip>
            <Chip theme={t} tone="warn" dot>等待確認</Chip>
            <Chip theme={t} tone="danger" dot>同步失敗</Chip>
            <Chip theme={t} tone="neutral" dot>已結束</Chip>
            <Chip theme={t} tone="forwarded" dot>外部訂單</Chip>
            <Chip theme={t} tone="owned" dot>自營派單</Chip>
          </div>
        </Card>

        <Card theme={t} padding={20}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Platform badges</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            <PlatformBadge theme={t} code="DRTS" name="自營派單" />
            <PlatformBadge theme={t} code="SRX" name="SmartRides X" forwarded />
            <PlatformBadge theme={t} code="METR" name="Metro Hail" forwarded />
          </div>
        </Card>

        <Card theme={t} padding={20}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Buttons</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <Button theme={t} kind="primary" size="md">主要操作</Button>
            <Button theme={t} kind="secondary" size="md">次要</Button>
            <Button theme={t} kind="outline" size="md">外框</Button>
            <Button theme={t} kind="primary" size="md" danger>危險</Button>
          </div>
        </Card>

        <Card theme={t} padding={20} style={{ gridColumn: 'span 2' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 10 }}>Authority banners</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <AuthorityBanner theme={t} platform="自營派單" subtitle="完整本機操作權限。" />
            <AuthorityBanner theme={t} forwarded platform="SmartRides X" subtitle="此訂單由平台主導，費用與最終狀態以平台為準。" />
          </div>
        </Card>
      </div>
    </div>
  );
}

function Swatch({ theme: t, bg, fg, border, k, v }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '10px 12px', background: bg, border: `1px solid ${border}`, borderRadius: 10,
    }}>
      <div style={{ width: 28, height: 28, borderRadius: 6, background: fg, flexShrink: 0 }} />
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: fg }}>{k}</div>
        <div style={{ fontSize: 11, color: t.textMuted, fontFamily: TYPE.mono, marginTop: 1 }}>{v}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
