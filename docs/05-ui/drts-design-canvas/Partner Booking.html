<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>Partner Booking · CTBC × DRTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter", "Noto Sans TC", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0A2A6E"/>
  <rect x="32" y="18" width="36" height="64" rx="6" fill="#FFFFFF"/>
  <rect x="36" y="24" width="28" height="18" rx="2" fill="#1B4FA0"/>
  <rect x="56" y="36" width="6" height="4" rx="1" fill="#C9A356"/>
  <rect x="36" y="48" width="28" height="2" fill="#E5E7EB"/>
  <rect x="36" y="54" width="20" height="2" fill="#E5E7EB"/>
  <rect x="36" y="64" width="28" height="12" rx="2" fill="#C9A356"/>
</svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="partner-screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showFrame": true
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const W = 402, H = 874;
  const Phone = ({ children, title }) => tw.showFrame
    ? <IOSDevice width={W} height={H} title={title}>{children}</IOSDevice>
    : <div style={{ width: W, height: H, background: '#F4F6FB', borderRadius: 32, overflow: 'hidden', border: '1px solid #E5E7EB' }}>{children}</div>;

  return (
    <>
      <DesignCanvas projectName="Partner Booking · CTBC World Elite" subtitle="卡友禮賓接送 · in-app webview · 7 步驟漏斗" accent="#1B4FA0">
        <DCSection id="discover" title="01 · 入口 + 資格" subtitle="從卡片權益頁進入 → 一次性連結">
          <DCArtboard id="landing" label="禮賓接送 入口" width={W} height={H}><Phone title="CTBC App"><PB_Landing /></Phone></DCArtboard>
          <DCArtboard id="eligibility" label="連結卡片 / 同意授權" width={W} height={H}><Phone title="CTBC App"><PB_Eligibility /></Phone></DCArtboard>
        </DCSection>

        <DCSection id="book" title="02 · 預約與派車" subtitle="表單 → 派車中">
          <DCArtboard id="book" label="建立行程" width={W} height={H}><Phone title="CTBC App"><PB_Book /></Phone></DCArtboard>
          <DCArtboard id="confirmed" label="已派車 / ETA" width={W} height={H}><Phone title="CTBC App"><PB_Confirmed /></Phone></DCArtboard>
        </DCSection>

        <DCSection id="history" title="03 · 行程紀錄與帳單">
          <DCArtboard id="trips" label="我的行程" width={W} height={H}><Phone title="CTBC App"><PB_Trips /></Phone></DCArtboard>
          <DCArtboard id="receipt" label="行程明細 / 收據" width={W} height={H}><Phone title="CTBC App"><PB_Receipt /></Phone></DCArtboard>
        </DCSection>

        <DCSection id="support" title="04 · 協助">
          <DCArtboard id="help" label="協助 / 客服 / 爭議" width={W} height={H}><Phone title="CTBC App"><PB_Help /></Phone></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Frame">
          <TweakToggle label="顯示 iPhone 外框" value={tw.showFrame} onChange={v => setTweak('showFrame', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
