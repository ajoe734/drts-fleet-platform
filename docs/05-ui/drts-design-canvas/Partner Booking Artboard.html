<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>Partner Booking · Single Artboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Inter", "Noto Sans TC", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px; }
  .pba-missing { color: #475569; font-size: 13px; line-height: 1.5; max-width: 360px; text-align: center; padding: 24px; }
  .pba-missing code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-family: "JetBrains Mono", monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="partner-screens.jsx"></script>

<script type="text/babel">
// Per-screen artboard host. Reads the URL hash (e.g. `#landing`) and renders
// exactly one PB_* component from `partner-screens.jsx` inside an iOS device
// frame. Designed for Storybook parity iframes so each story lands directly
// on its reference artboard with no scroll/anchor dependency on the full
// design canvas.
const SCREEN_COMPONENTS = {
  landing: 'PB_Landing',
  eligibility: 'PB_Eligibility',
  book: 'PB_Book',
  confirmed: 'PB_Confirmed',
  trips: 'PB_Trips',
  receipt: 'PB_Receipt',
  help: 'PB_Help',
};

function readScreenId() {
  const raw = (location.hash || '').replace(/^#/, '').trim().toLowerCase();
  return SCREEN_COMPONENTS[raw] ? raw : '';
}

function ArtboardHost() {
  const [screen, setScreen] = React.useState(readScreenId());
  React.useEffect(() => {
    const onHash = () => setScreen(readScreenId());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const W = 402, H = 874;
  const componentName = SCREEN_COMPONENTS[screen];
  const Screen = componentName && window[componentName];

  if (!Screen) {
    const known = Object.keys(SCREEN_COMPONENTS).map((k) => '#' + k).join(', ');
    return (
      <div className="pba-missing">
        <div>Pick a screen via URL hash. Known anchors:</div>
        <div style={{ marginTop: 8 }}><code>{known}</code></div>
      </div>
    );
  }

  return (
    <IOSDevice width={W} height={H} title="CTBC App">
      <Screen />
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArtboardHost />);
</script>
</body>
</html>
