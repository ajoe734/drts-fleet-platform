apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: drts-tenant-portal-web
  labels:
    app: drts-tenant-portal-web
    env: staging
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      serviceAccountName: SERVICE_ACCOUNT_PLACEHOLDER
      containers:
        - image: IMAGE_PLACEHOLDER
          name: drts-tenant-portal-web
          ports:
            - name: http1
              containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: API_URL_PLACEHOLDER
