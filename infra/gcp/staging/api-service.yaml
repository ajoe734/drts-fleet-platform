apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: drts-api
  labels:
    app: drts-api
    env: staging
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Cloud SQL Auth Proxy built-in integration — socket at /cloudsql/<INSTANCE>
        run.googleapis.com/cloudsql-instances: "CLOUDSQL_INSTANCE_PLACEHOLDER"
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      serviceAccountName: SERVICE_ACCOUNT_PLACEHOLDER
      containers:
        - image: IMAGE_PLACEHOLDER
          name: drts-api
          ports:
            - name: http1
              containerPort: 3001
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: drts-staging-db-url
            - name: API_KEY_SALT
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: drts-staging-api-key-salt
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: drts-staging-jwt-secret
            - name: DRTS_INTERNAL_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: drts-staging-internal-key
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3
