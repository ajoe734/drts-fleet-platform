name: CI

# ci-feat — the 3 gates every PR must clear to merge into a protected branch.
# Branch protection on main + backend-dev + frontend-dev requires:
#   ① Commit trailers       — commit messages have <TASK-ID>: subject + Task-ID/LLM-Agent/Reviewer trailers
#   ② Runtime mirror guard  — no docs-site/ / *-bg.pid / runtime-logs/ etc. in the diff
#   ③ Smoke acceptance      — lint + typecheck + unit tests pass
#
# See docs/ops/branch-strategy.md §6 for the model.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - 'backend-dev'
      - 'frontend-dev'
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  commit-trailers:
    name: Commit trailers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Determine base ref
        id: base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate trailers on every commit in the PR
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref || 'main' }}" --quiet
          python3 scripts/git/check_commit_trailers.py --base ${{ steps.base.outputs.ref }} --head HEAD

  runtime-mirror-guard:
    name: Runtime mirror guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Determine base ref
        id: base
        run: |
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate no runtime mirrors in PR diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref || 'main' }}" --quiet
          python3 scripts/git/check_staged_generated_files.py --range ${{ steps.base.outputs.ref }} HEAD

  smoke-acceptance:
    name: Smoke acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.33.0, run_install: false }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: pnpm-lock.yaml }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit tests
        run: pnpm run test:unit
