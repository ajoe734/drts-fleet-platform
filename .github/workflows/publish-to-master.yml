name: Publish dev → master (auto-tag prod-candidate)

# T9 of the v3 branch strategy: every green CI (integration trunk) on
# backend-dev / frontend-dev auto-opens a PR to main, auto-merges it (admin
# bypass — main protection is 0 reviewers + ci-feat), and tags the resulting
# main commit with prod-YYYY-MM-DD-<sha8>. That tag is the unit of selection
# for T10 (staging deploy) and T11 (production deploy) — both operator-driven.
#
# Anti-recursion note: GITHUB_TOKEN can't create PRs that trigger workflows;
# we close+reopen the PR right after creation to fire downstream ci-feat. The
# fallback workflow_dispatch is provided for re-running against an explicit
# source SHA.

on:
  workflow_run:
    workflows: ["CI (integration trunk)"]
    types: [completed]
    branches:
      - backend-dev
      - frontend-dev
  push:
    branches: [main]   # for tag-on-merge job
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source dev branch (backend-dev or frontend-dev)'
        required: true
        type: choice
        options:
          - backend-dev
          - frontend-dev

permissions:
  contents: write       # for tagging
  pull-requests: write  # for the auto-PR

concurrency:
  group: publish-to-master-${{ github.event.workflow_run.head_branch || github.event.inputs.source_branch }}
  cancel-in-progress: false   # never cancel a publish in flight

jobs:
  publish:
    # Runs on workflow_run (from green ci-integ) or workflow_dispatch.
    # Skips when triggered via push (that's for tag-on-merge below).
    if: ${{ (github.event_name == 'workflow_dispatch') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve source branch + SHA
        id: src
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            branch="${{ github.event.inputs.source_branch }}"
            sha="$(gh api repos/${{ github.repository }}/branches/$branch --jq .commit.sha)"
          else
            branch="${{ github.event.workflow_run.head_branch }}"
            sha="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Publishing $branch @ $sha"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check there is content to publish
        id: delta
        run: |
          git fetch origin "${{ steps.src.outputs.branch }}" main
          ahead=$(git rev-list --count "origin/main..${{ steps.src.outputs.sha }}")
          if [ "$ahead" = "0" ]; then
            echo "::notice::No commits from ${{ steps.src.outputs.branch }} to publish; main is up to date."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "origin/main..${{ steps.src.outputs.sha }}"; then
            echo "::notice::No content delta between main and ${{ steps.src.outputs.branch }} (history-only)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"

      - name: Open or update auto-PR
        if: steps.delta.outputs.skip != 'true'
        id: pr
        run: |
          src="${{ steps.src.outputs.branch }}"
          existing=$(gh pr list --base main --head "$src" --state open --json number --jq '.[0].number // empty')
          title="auto-publish: $src → main ($(date -u +%F))"
          body=$(cat <<EOF
          Auto-PR generated by publish-to-master.yml (T9 of v3 branch strategy).

          - Source branch: \`$src\`
          - Source SHA: \`${{ steps.src.outputs.sha }}\`
          - Commits ahead of main: ${{ steps.delta.outputs.ahead }}
          - Upstream ci-integ: green
          - Auto-merge: enabled

          Once merged, the publish workflow tags the main commit
          \`prod-$(date -u +%Y%m%d)-<sha8>\`. Operators pick a prod tag for
          staging / production deploys (see deploy-staging.yml, deploy-prod.yml).
          EOF
          )
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body "$body" || true
            pr_number="$existing"
            echo "Updated existing auto-PR #$pr_number"
          else
            pr_url=$(gh pr create --base main --head "$src" --title "$title" --body "$body")
            pr_number=$(basename "$pr_url")
            echo "Created auto-PR #$pr_number ($pr_url)"
          fi
          gh pr edit "$pr_number" --add-label "automated" --add-label "auto-publish" || echo "::warning::Label add failed (non-fatal)."
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN-created PRs do not fire downstream workflows.
      # Close+reopen forces ci-feat to run, satisfying main's required check.
      - name: Cycle PR to trigger ci-feat
        if: steps.delta.outputs.skip != 'true'
        run: |
          gh pr close "${{ steps.pr.outputs.pr_number }}" || true
          sleep 2
          gh pr reopen "${{ steps.pr.outputs.pr_number }}" || true

      - name: Enable auto-merge
        if: steps.delta.outputs.skip != 'true'
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" --squash --auto || \
            echo "::warning::Auto-merge enable failed; the PR will need manual merge once ci-feat is green."

      # Tagging happens in a follow-up job after the PR actually merges
      # (separate workflow tag-on-merge below). Keeping it in this same workflow
      # would require waiting indefinitely for auto-merge; using a separate
      # push trigger is cleaner.

  tag-on-merge:
    # Runs on push to main; tags the new commit with prod-YYYY-MM-DD-<sha8>.
    # Same workflow file so the tag policy lives with publish logic.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag prod-candidate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          short=$(git rev-parse --short=8 HEAD)
          tag="prod-$(date -u +%Y%m%d)-$short"
          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
            exit 0
          fi
          git tag -a "$tag" -m "Auto-published prod-candidate at $(git rev-parse HEAD)"
          git push origin "$tag"
          echo "Tagged $tag — available for deploy-staging.yml / deploy-prod.yml tag-pick."
