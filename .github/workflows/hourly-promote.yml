name: Hourly promote (publish → master)

# T9 of v4 branch strategy: every hour, look at the latest publish/v<date>
# branch. If it has been around long enough to receive feedback (default:
# ≥30 minutes) and no `regression:v<date>` issue is open against it, open
# an auto-PR `publish/v<date> → main`, set auto-merge, and after the merge
# the workflow tags `prod/v<date>` (handled by tag-on-merge job below).
#
# Idempotent. If main already contains the publish snapshot's content
# (git diff --quiet), skip silently.

on:
  schedule:
    - cron: "15 * * * *" # 15 past every hour, staggered from other crons
  push:
    branches: [main] # for tag-on-merge job
  workflow_dispatch:
    inputs:
      version:
        description: "Publish version to promote (e.g. v2026.05.18.0). Default: latest publish/v* on origin."
        required: false
        type: string
      soak_minutes:
        description: "Minimum minutes a publish must have existed before promotion"
        required: false
        default: "30"
        type: string

permissions:
  checks: write # publish required-check results directly on the promote SHA
  contents: write # for the auto-PR + tag
  pull-requests: write
  issues: write # regression-label check + label provisioning

concurrency:
  group: hourly-promote
  cancel-in-progress: false

jobs:
  promote:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SOAK_MINUTES: ${{ github.event.inputs.soak_minutes || '30' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find publish to promote
        id: pick
        run: |
          want="${{ github.event.inputs.version }}"
          if [ -n "$want" ]; then
            branch="publish/$want"
            git fetch origin "$branch" --quiet
            if ! git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              echo "::error::publish branch $branch does not exist on origin."
              exit 1
            fi
          else
            # Latest publish/* by version sort
            branch=$(git ls-remote --heads origin "refs/heads/publish/v*" \
              | awk '{print $2}' | sort -V | tail -1 | sed 's|refs/heads/||')
            if [ -z "$branch" ]; then
              echo "::notice::No publish/v* branches exist yet; skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git fetch origin "$branch" --quiet
          fi
          version="${branch#publish/}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          sha=$(git rev-parse "origin/$branch")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Considering $branch @ ${sha:0:12} for promotion"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Soak period check
        if: steps.pick.outputs.skip != 'true'
        id: soak
        run: |
          # Use the commit time of the publish branch HEAD as the cut moment.
          cut_time=$(git log -1 --format=%cI "${{ steps.pick.outputs.sha }}")
          cut_ts=$(date -d "$cut_time" +%s)
          now_ts=$(date -u +%s)
          age_min=$(( (now_ts - cut_ts) / 60 ))
          echo "Publish age: ${age_min}m (require ≥${SOAK_MINUTES}m)"
          if [ "$age_min" -lt "$SOAK_MINUTES" ]; then
            echo "::notice::Publish ${{ steps.pick.outputs.version }} is only ${age_min}m old; soak period not met. Will retry next hour."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Regression-label check
        if: steps.pick.outputs.skip != 'true' && steps.soak.outputs.skip != 'true'
        id: regression
        run: |
          # Any open issue with label `regression:<version>` blocks promotion.
          label="regression:${{ steps.pick.outputs.version }}"
          count=$(gh issue list --state open --label "$label" --json number --jq 'length')
          if [ "$count" -gt 0 ]; then
            echo "::warning::$count open regression issue(s) labeled '$label' block promotion."
            gh issue list --state open --label "$label" --json number,title --jq '.[]|"  #\(.number) \(.title)"' || true
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Already promoted?
        if: steps.pick.outputs.skip != 'true' && steps.soak.outputs.skip != 'true' && steps.regression.outputs.skip != 'true'
        id: already
        run: |
          git fetch origin main --quiet
          if git diff --quiet "origin/main..${{ steps.pick.outputs.sha }}"; then
            echo "::notice::main already contains the publish's content; nothing to promote."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open promote PR
        if: steps.pick.outputs.skip != 'true' && steps.soak.outputs.skip != 'true' && steps.regression.outputs.skip != 'true' && steps.already.outputs.skip != 'true'
        id: pr
        run: |
          src="${{ steps.pick.outputs.branch }}"
          ver="${{ steps.pick.outputs.version }}"
          title="auto-promote: $src → main ($ver)"
          body=$(cat <<EOF
          Hourly auto-promotion (T9 of v4 branch strategy).

          - Snapshot: \`$src\` @ \`${{ steps.pick.outputs.sha }}\`
          - Soak passed: ${{ env.SOAK_MINUTES }}+ minutes since cut
          - No open \`regression:$ver\` issue
          - main does not yet contain this content

          This workflow merges the PR inline and tags \`prod/$ver\` once CI
          is green — does not rely on GitHub auto-merge (which can't push
          tag-on-merge downstream under the GITHUB_TOKEN anti-recursion rule).

          Block this promotion: open an issue labeled \`regression:$ver\`.
          EOF
          )
          existing=$(gh pr list --base main --head "$src" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body "$body" || true
            pr_number="$existing"
          else
            pr_url=$(gh pr create --base main --head "$src" --title "$title" --body "$body")
            pr_number=$(basename "$pr_url")
          fi
          # These labels drive the Commit trailers bypass in ci.yml. Provision
          # them here so missing repo metadata does not silently break promote PRs.
          scripts/branch-strategy/ensure-github-labels.sh --apply --repo "$GITHUB_REPOSITORY"
          gh pr edit "$pr_number" --add-label "automated" --add-label "auto-publish"

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.pr.outputs.pr_number != ''
        with: { version: 10.33.0, run_install: false }

      - uses: actions/setup-node@v4
        if: steps.pr.outputs.pr_number != ''
        with:
          {
            node-version: 22,
            cache: pnpm,
            cache-dependency-path: pnpm-lock.yaml,
          }

      - name: Publish required checks on promote SHA
        if: steps.pr.outputs.pr_number != ''
        id: checks
        run: |
          # GITHUB_TOKEN-triggered PR events no longer fan out into ci.yml
          # reliably, and publish/* snapshots should stay immutable. Run the
          # required branch-protection gates directly on the promote SHA.
          sha="${{ steps.pick.outputs.sha }}"
          src="${{ steps.pick.outputs.branch }}"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          workdir=$(mktemp -d "${RUNNER_TEMP:-/tmp}/promote-sha-XXXXXX")
          overall=0

          cleanup() {
            git worktree remove --force "$workdir" >/dev/null 2>&1 || rm -rf "$workdir"
          }
          trap cleanup EXIT

          git fetch origin main "$src" --quiet
          git worktree add --detach "$workdir" "$sha"

          create_check() {
            name="$1"
            summary="$2"
            payload=$(jq -n \
              --arg name "$name" \
              --arg sha "$sha" \
              --arg url "$run_url" \
              --arg summary "$summary" \
              '{
                name: $name,
                head_sha: $sha,
                status: "in_progress",
                details_url: $url,
                output: {
                  title: $name,
                  summary: $summary
                }
              }')
            gh api "repos/$GITHUB_REPOSITORY/check-runs" -X POST --input - --jq '.id' <<<"$payload"
          }

          complete_check() {
            id="$1"
            name="$2"
            conclusion="$3"
            summary="$4"
            text="$5"
            payload=$(jq -n \
              --arg name "$name" \
              --arg conclusion "$conclusion" \
              --arg summary "$summary" \
              --arg text "$text" \
              --arg url "$run_url" \
              --arg completed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{
                status: "completed",
                conclusion: $conclusion,
                completed_at: $completed_at,
                details_url: $url,
                output: {
                  title: $name,
                  summary: $summary,
                  text: $text
                }
              }')
            gh api "repos/$GITHUB_REPOSITORY/check-runs/$id" -X PATCH --input - >/dev/null <<<"$payload"
          }

          run_check() {
            name="$1"
            intro="$2"
            shift 2
            log="$RUNNER_TEMP/${name// /_}.log"
            check_id=$(create_check "$name" "$intro")
            if (cd "$workdir" && "$@") >"$log" 2>&1; then
              complete_check "$check_id" "$name" success "$name passed." "$(tail -n 80 "$log")"
            else
              overall=1
              complete_check "$check_id" "$name" failure "$name failed." "$(tail -n 80 "$log")"
            fi
          }

          commit_trailers_id=$(create_check \
            "Commit trailers" \
            "Auto-publish snapshots inherit trailer enforcement from the dev gate.")
          complete_check \
            "$commit_trailers_id" \
            "Commit trailers" \
            success \
            "Commit trailers bypassed for auto-publish promote." \
            "Auto-publish promote PRs collect commits that were already validated when they entered dev. Re-running the trailer gate on immutable publish history would fail on earlier squash-merged commits without adding signal."

          run_check \
            "Runtime mirror guard" \
            "Checking the promote diff for generated runtime mirror files." \
            python3 scripts/git/check_staged_generated_files.py --range origin/main HEAD

          run_check \
            "Smoke acceptance" \
            "Running lint, typecheck, and unit tests on the promote snapshot." \
            bash -lc 'pnpm install --frozen-lockfile && pnpm run lint && pnpm run typecheck && pnpm run test:unit'

          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
          exit "$overall"

      - name: Wait for required PR checks to register
        if: steps.pr.outputs.pr_number != ''
        id: wait
        run: |
          pr="${{ steps.pr.outputs.pr_number }}"
          run_url="${{ steps.checks.outputs.run_url }}"
          required=("Commit trailers" "Runtime mirror guard" "Smoke acceptance")
          # GitHub can take a short moment to surface freshly-published checks
          # on the PR head SHA and satisfy branch protection.
          for i in $(seq 1 20); do
            all_done=true
            all_green=true
            failures=()
            checks=$(gh pr view "$pr" --json statusCheckRollup --jq '.statusCheckRollup')
            for name in "${required[@]}"; do
              entry=$(echo "$checks" | jq -c --arg n "$name" --arg url "$run_url" '
                map(select(.name == $n and (.detailsUrl // "") == $url))
                | last // empty
              ')
              if [ -z "$entry" ]; then
                all_done=false
                continue
              fi
              status=$(echo "$entry" | jq -r '.status')
              conclusion=$(echo "$entry" | jq -r '.conclusion // ""')
              if [ "$status" != "COMPLETED" ]; then
                all_done=false
              elif [ "$conclusion" != "SUCCESS" ]; then
                all_green=false
                failures+=("$name=$conclusion")
              fi
            done
            if [ "$all_done" = "true" ]; then
              if [ "$all_green" = "true" ]; then
                echo "All 3 required checks green after ${i} poll(s)."
                echo "ready=true" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "::error::Required checks failed: ${failures[*]}"
                exit 1
              fi
            fi
            echo "[$i] still waiting for required checks..."
            sleep 15
          done
          echo "::error::Timed out waiting for required checks from $run_url to register on PR #$pr."
          exit 1

      - name: Merge inline
        if: steps.wait.outputs.ready == 'true'
        id: merge
        run: |
          pr="${{ steps.pr.outputs.pr_number }}"
          gh pr merge "$pr" --squash
          echo "Merged PR #$pr"
          # Wait briefly for the merge to settle on origin.
          sleep 3
          git fetch origin main --quiet
          sha=$(git rev-parse origin/main)
          echo "main_sha=$sha" >> "$GITHUB_OUTPUT"
          echo "main HEAD is now $sha"

      - name: Tag prod/v<version> inline
        if: steps.merge.outputs.main_sha != ''
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          ver="${{ steps.pr.outputs.version }}"
          tag="prod/$ver"
          sha="${{ steps.merge.outputs.main_sha }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
            exit 0
          fi
          git tag -a "$tag" "$sha" -m "Promoted from ${{ steps.pick.outputs.branch }}"
          git push origin "$tag"
          echo "Tagged $tag at main HEAD $sha"

      - name: Summarise
        if: steps.pr.outputs.pr_number != ''
        run: |
          pr="${{ steps.pr.outputs.pr_number }}"
          ver="${{ steps.pr.outputs.version }}"
          src="${{ steps.pick.outputs.branch }}"
          merged_sha="${{ steps.merge.outputs.main_sha }}"
          {
            echo "## Promotion run"
            echo ""
            echo "- PR: #$pr"
            echo "- Version: \`$ver\`"
            echo "- Snapshot: \`$src\`"
            if [ -n "$merged_sha" ]; then
              echo "- Status: ✅ merged inline + tagged \`prod/$ver\` at main \`${merged_sha:0:12}\`"
            else
              echo "- Status: ⚠️ CI did not go green; PR left open. Investigate the failing required check."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Fallback tagger. The hourly `promote` job above tags prod/v<...> inline
  # after its own inline merge — that handles the common case.
  # This job fires on any push to main (e.g. a hotfix PR merged by a human,
  # which DOES trigger push events because it's not a GITHUB_TOKEN action).
  # It tags only if main's tree matches some existing publish snapshot — so
  # hotfix commits that diverge from publish don't accidentally get tagged.
  tag-on-merge:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag prod/v<date> if main HEAD matches a publish snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          sha=$(git rev-parse HEAD)

          # Find publish branches that have the same TREE as main HEAD.
          # Squash-merge changes the SHA but preserves the tree; we match by tree.
          main_tree=$(git rev-parse "$sha^{tree}")
          matched_publish=""
          for ref in $(git ls-remote --heads origin "refs/heads/publish/v*" | awk '{print $2}' | sort -V); do
            git fetch origin "$ref" --quiet 2>&1 || continue
            pub_sha=$(git ls-remote --heads origin "$ref" | awk '{print $1}')
            pub_tree=$(git rev-parse "$pub_sha^{tree}" 2>/dev/null) || continue
            if [ "$pub_tree" = "$main_tree" ]; then
              matched_publish="${ref#refs/heads/}"
              break
            fi
          done
          if [ -z "$matched_publish" ]; then
            echo "::notice::main HEAD tree does not match any publish snapshot; not tagging (this is a hotfix or unrelated push)."
            exit 0
          fi
          version="${matched_publish#publish/}"
          tag="prod/$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
            exit 0
          fi
          git tag -a "$tag" "$sha" -m "Promoted to master from $matched_publish"
          git push origin "$tag"
          echo "Tagged $tag — available for deploy-prod.yml input."
