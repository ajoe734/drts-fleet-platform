name: Promote dev → staging (milestone)

# Manually triggered when an AI / human declares "milestone complete" — promotes
# the current backend-dev / frontend-dev HEAD to the corresponding *-staging
# branch. *-staging push then auto-triggers Deploy — Staging via workflow_run.
#
# This is NOT cron-scheduled by design: AI commits dev continuously, and we
# only want staging to advance on a deliberate human/supervisor decision tied
# to a real milestone (verified integration tests, scope-of-work close-out).
#
# To enable supervisor auto-promotion, future work: add a watch job that polls
# ai-status.json and fires this workflow when a milestone closes cleanly.

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Which track to promote'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      milestone:
        description: 'Milestone / wave / scope identifier (required for audit trail, e.g. "W3-canvas-redesign" or "BE-APR-001")'
        required: true
      run_integration_tests:
        description: 'Re-verify ci-integ is green on dev HEAD before promoting'
        required: false
        default: true
        type: boolean

permissions:
  contents: write   # to fast-forward push dev → staging
  pull-requests: write
  actions: read
  checks: read

jobs:
  promote:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        track:
          - { name: backend,  dev: backend-dev,  staging: backend-staging  }
          - { name: frontend, dev: frontend-dev, staging: frontend-staging }
    steps:
      - name: Skip if track filter excludes this one
        id: filter
        run: |
          want="${{ github.event.inputs.track }}"
          if [ "$want" != "both" ] && [ "$want" != "${{ matrix.track.name }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify dev is ahead of staging (content)
        if: steps.filter.outputs.skip != 'true'
        id: diff
        run: |
          git fetch origin "${{ matrix.track.dev }}" "${{ matrix.track.staging }}"
          ahead=$(git rev-list --count "origin/${{ matrix.track.staging }}..origin/${{ matrix.track.dev }}")
          echo "ahead=$ahead" >> "$GITHUB_OUTPUT"
          if [ "$ahead" = "0" ]; then
            echo "::warning::${{ matrix.track.dev }} is not ahead of ${{ matrix.track.staging }}; nothing to promote."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "origin/${{ matrix.track.staging }}..origin/${{ matrix.track.dev }}"; then
            echo "::warning::No content delta between dev and staging (history-only divergence); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Promoting $ahead commit(s) for milestone: ${{ github.event.inputs.milestone }}"

      - name: Verify dev CI is green
        if: steps.filter.outputs.skip != 'true' && steps.diff.outputs.skip != 'true' && github.event.inputs.run_integration_tests == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(git rev-parse "origin/${{ matrix.track.dev }}")
          state=$(gh api "repos/${{ github.repository }}/commits/$sha/check-runs" \
            --jq '[.check_runs[] | select(.name=="ci-integ")] | (if length==0 then "missing" else (.[0].conclusion // "pending") end)')
          echo "ci-integ on $sha = $state"
          if [ "$state" != "success" ]; then
            echo "::error::Refusing to promote: ci-integ on ${{ matrix.track.dev }} HEAD is $state (need success). Re-run ci-integ first or pass run_integration_tests=false to override."
            exit 1
          fi

      - name: Fast-forward push dev → staging
        if: steps.filter.outputs.skip != 'true' && steps.diff.outputs.skip != 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Push dev's HEAD onto staging. Use --force-with-lease against the
          # last-known staging HEAD to refuse if someone else moved it.
          git push --force-with-lease=${{ matrix.track.staging }}:$(git rev-parse origin/${{ matrix.track.staging }}) \
            origin "refs/remotes/origin/${{ matrix.track.dev }}:refs/heads/${{ matrix.track.staging }}"
          echo "Promoted ${{ matrix.track.dev }} → ${{ matrix.track.staging }} for milestone '${{ github.event.inputs.milestone }}'."
          echo "Deploy — Staging will fire via workflow_run once ci-staging on ${{ matrix.track.staging }} completes."

      - name: Summarise
        if: steps.filter.outputs.skip != 'true'
        run: |
          echo "## Promotion summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Track: ${{ matrix.track.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dev branch: \`${{ matrix.track.dev }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Staging branch: \`${{ matrix.track.staging }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Milestone: ${{ github.event.inputs.milestone }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commits promoted: ${{ steps.diff.outputs.ahead }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
