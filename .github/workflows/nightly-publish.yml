name: Nightly publish (cut snapshot)

# T4-T7 of v4 branch strategy: once per night (03:00 UTC = 11:00 Taipei), cut
# an immutable publish/v<date> branch from dev's current HEAD AND tag it
# release/v<date>. Pushing the publish branch triggers Deploy — Dev separately
# so the dev VM rolls over to this snapshot.
#
# Idempotent: if today's first publish already exists, increment the .N suffix
# (v2026.05.18.0 -> v2026.05.18.1).

on:
  schedule:
    # 03:00 UTC = 11:00 Asia/Taipei = start of TW business day
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to snapshot (default: dev)'
        required: false
        default: 'dev'
        type: string

permissions:
  contents: write   # create branch + tag
  actions: write    # gh workflow run deploy-dev.yml from inside this workflow

concurrency:
  group: nightly-publish
  cancel-in-progress: false

jobs:
  cut:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SOURCE: ${{ github.event.inputs.source_branch || 'dev' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve source SHA
        id: src
        run: |
          git fetch origin "$SOURCE" --quiet
          sha=$(git rev-parse "origin/$SOURCE")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Snapshotting $SOURCE @ $sha"

      - name: Verify dev's latest ci-integ is green
        id: green
        run: |
          state=$(gh api "repos/${{ github.repository }}/commits/${{ steps.src.outputs.sha }}/check-runs" \
            --jq '[.check_runs[] | select(.name=="ci-integ")] | (if length==0 then "missing" else (.[0].conclusion // "pending") end)')
          echo "ci-integ on dev HEAD = $state"
          if [ "$state" != "success" ]; then
            echo "::warning::ci-integ on dev HEAD is $state (need success). Skipping nightly publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.green.outputs.skip != 'true'
        id: ver
        run: |
          today_date=$(date -u +%Y.%m.%d)
          today_pattern=${today_date//./\\.}
          # Find the highest .N already used today; default to .0 if none.
          existing_num=$(git ls-remote --tags --refs origin "refs/tags/release/v${today_date}.*" \
            | awk '{print $2}' \
            | sed -E "s#^refs/tags/release/v${today_pattern}\\.([0-9]+)\$#\\1#" \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -1)
          if [ -z "$existing_num" ]; then
            n=0
          else
            n=$((existing_num + 1))
          fi
          version="v${today_date}.${n}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next publish version: $version"

      - name: Check source has content delta vs latest publish
        if: steps.green.outputs.skip != 'true'
        id: delta
        run: |
          # Find latest publish/* branch on origin
          latest_publish=$(git ls-remote --heads origin "refs/heads/publish/v*" \
            | awk '{print $2}' | sort -V | tail -1 | sed 's|refs/heads/||')
          if [ -z "$latest_publish" ]; then
            echo "No previous publish branch; cutting first one."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "$latest_publish" --quiet
          if git diff --quiet "origin/$latest_publish..${{ steps.src.outputs.sha }}"; then
            echo "::notice::No content delta between $latest_publish and dev HEAD; skipping nightly publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cut publish branch + tag
        if: steps.green.outputs.skip != 'true' && steps.delta.outputs.skip != 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          version="${{ steps.ver.outputs.version }}"
          sha="${{ steps.src.outputs.sha }}"
          branch="publish/$version"
          tag="release/$version"
          # Push branch
          git push origin "$sha:refs/heads/$branch"
          echo "Created branch $branch @ $sha"
          # Push annotated tag
          git tag -a "$tag" "$sha" -m "Nightly publish snapshot of $SOURCE at $sha"
          git push origin "$tag"
          echo "Tagged $tag"

      - name: Explicitly dispatch Deploy — Dev for the new snapshot
        if: steps.green.outputs.skip != 'true' && steps.delta.outputs.skip != 'true'
        run: |
          # The push of publish/v* above is by GITHUB_TOKEN, which under
          # GitHub's anti-recursion rules does NOT trigger downstream `push`
          # event workflows. workflow_dispatch IS allowed by the same rules,
          # so we dispatch deploy-dev explicitly. Without this, dev VM would
          # not roll until an operator manually triggers a deploy.
          version="${{ steps.ver.outputs.version }}"
          branch="publish/$version"
          if gh workflow run deploy-dev.yml --ref "$branch" -f source_ref="$branch" 2>&1; then
            echo "Dispatched deploy-dev.yml against $branch"
          else
            echo "::warning::Failed to dispatch deploy-dev.yml. Operator can run manually: gh workflow run deploy-dev.yml -f source_ref=$branch"
          fi

      - name: Summarise
        if: steps.green.outputs.skip != 'true' && steps.delta.outputs.skip != 'true'
        run: |
          version="${{ steps.ver.outputs.version }}"
          branch="publish/$version"
          tag="release/$version"
          sha="${{ steps.src.outputs.sha }}"
          {
            echo "## Nightly publish: \`$version\`"
            echo ""
            echo "- Source: \`$SOURCE\` @ \`${sha:0:12}\`"
            echo "- Branch: \`$branch\` (immutable snapshot)"
            echo "- Tag:    \`$tag\` (same SHA)"
            echo "- Deploy — Dev: dispatched explicitly (push by GITHUB_TOKEN can't auto-trigger)"
            echo "- Promotion to master: \`hourly-promote.yml\` will pick this up after the ≥30 min soak window unless a \`regression:$version\` issue is opened."
          } >> "$GITHUB_STEP_SUMMARY"
