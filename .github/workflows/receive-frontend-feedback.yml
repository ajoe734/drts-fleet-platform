name: Receive frontend feedback from Lovable

on:
  repository_dispatch:
    types: [frontend-feedback]

jobs:
  handle-feedback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch feedback files from tenant-commute-hub
        run: |
          mkdir -p .ai-loop-incoming
          curl -sf \
            "https://raw.githubusercontent.com/ajoe734/tenant-commute-hub/main/.ai-loop/LOVABLE_CHANGE_FEEDBACK.md" \
            -o .ai-loop-incoming/LOVABLE_CHANGE_FEEDBACK.md
          curl -sf \
            "https://raw.githubusercontent.com/ajoe734/tenant-commute-hub/main/.ai-loop/API_GAP_REQUESTS.json" \
            -o .ai-loop-incoming/API_GAP_REQUESTS.json
          echo "Fetched at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .ai-loop-incoming/last_received.txt
          echo "commit=${{ github.event.client_payload.commit }}" >> .ai-loop-incoming/last_received.txt
          echo "iteration=${{ github.event.client_payload.iteration }}" >> .ai-loop-incoming/last_received.txt

      - name: Enqueue orchestrator event
        run: |
          python3 - <<'EOF'
          import json, datetime, os
          event = {
            "type": "frontend_feedback_received",
            "timestamp": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "payload": {
              "iteration": "${{ github.event.client_payload.iteration }}",
              "tenant_commit": "${{ github.event.client_payload.commit }}",
              "feedback_file": ".ai-loop-incoming/LOVABLE_CHANGE_FEEDBACK.md",
              "gaps_file": ".ai-loop-incoming/API_GAP_REQUESTS.json"
            }
          }
          with open(".orchestrator/event-queue.jsonl", "a") as f:
              f.write(json.dumps(event) + "\n")
          print("Enqueued:", json.dumps(event))
          EOF

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .ai-loop-incoming/ .orchestrator/event-queue.jsonl
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(ai-loop): receive lovable feedback iteration=${{ github.event.client_payload.iteration }} [skip ci]"
          git push
