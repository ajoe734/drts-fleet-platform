name: Promote — Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to promote from dev into staging (usually the 12-char main commit SHA)"
        required: true
        type: string
      skip_migration:
        description: "Skip DB migration step (use only if migrations already applied)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  promote-staging:
    name: Promote approved artifact to staging
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment_name: staging
      image_tag: ${{ inputs.image_tag }}
      build_images: false
      skip_migration: ${{ inputs.skip_migration == 'true' }}
      protected_control_plane: true
