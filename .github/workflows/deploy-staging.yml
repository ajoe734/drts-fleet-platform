name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migration:
        description: "Skip DB migration step (use only if migrations already applied)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

concurrency:
  group: deploy-staging
  cancel-in-progress: false # serialise deploys; never cancel a running migration

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/drts
  CLOUDSQL: ${{ vars.GCP_CLOUDSQL_INSTANCE }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Build & push all images to Artifact Registry
  # ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ──────────────────────────────────────────────────
      - name: Build & push — api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/api:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/api:cache,mode=max

      # ── Migrate image ────────────────────────────────────────
      - name: Build & push — migrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/migrate:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/migrate:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/migrate:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/migrate:cache,mode=max

      # ── Web apps ─────────────────────────────────────────────
      # tenant-portal-web: RETIRED (SUNSET-001-tenant-portal-web, FBP-007).
      # Production tenant UI is tenant-commute-hub (external repo).
      # Build step removed from active pipeline.

      - name: Build & push — platform-admin-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/platform-admin-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/platform-admin-web:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/platform-admin-web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/platform-admin-web:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/platform-admin-web:cache,mode=max

      - name: Build & push — ops-console-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ops-console-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ops-console-web:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/ops-console-web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ops-console-web:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/ops-console-web:cache,mode=max

  # ──────────────────────────────────────────────────────────────
  # 2. Run DB migrations via Cloud Run Job
  # ──────────────────────────────────────────────────────────────
  migrate:
    name: DB migration
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ inputs.skip_migration != 'true' }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create / update migration job definition
        run: |
          IMAGE="${{ env.REGISTRY }}/migrate:${{ needs.build-push.outputs.image_tag }}"
          # Upsert the Cloud Run Job with the new image; remaining config comes from migrate-job.yaml.
          gcloud run jobs update drts-migrate \
            --region "$REGION" \
            --image  "$IMAGE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-secrets "DATABASE_URL=drts-staging-db-url:latest" \
            --max-retries 0 \
            --project "$PROJECT_ID" \
          || gcloud run jobs create drts-migrate \
            --region "$REGION" \
            --image  "$IMAGE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-secrets "DATABASE_URL=drts-staging-db-url:latest" \
            --max-retries 0 \
            --project "$PROJECT_ID"

      - name: Execute migration job and wait for completion
        run: |
          set -euo pipefail

          if gcloud run jobs execute drts-migrate \
            --region  "$REGION" \
            --wait    \
            --project "$PROJECT_ID"; then
            exit 0
          fi

          echo "::error::drts-migrate execution failed. Capturing latest execution metadata for triage."
          EXECUTION_NAME="$(gcloud run jobs describe drts-migrate \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.latestCreatedExecution.name)' \
            2>/dev/null || true)"

          if [[ -n "$EXECUTION_NAME" ]]; then
            echo "Latest execution: $EXECUTION_NAME"
            gcloud run jobs executions describe "$EXECUTION_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format='yaml(metadata.name,status.startTime,status.completionTime,status.logUri,status.conditions,status.failedCount,status.runningCount,status.succeededCount)' \
              || true
            gcloud run jobs executions tasks list \
              --execution="$EXECUTION_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --succeeded \
              || true
          else
            echo "Unable to resolve status.latestCreatedExecution.name for drts-migrate." >&2
          fi

          exit 1

  # ──────────────────────────────────────────────────────────────
  # 3. Deploy Cloud Run services
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy services
    runs-on: ubuntu-latest
    needs: [build-push, migrate]
    # Run deploy even when migration is skipped (migrate job is skipped, not failed)
    if: ${{ always() && needs.build-push.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy — api
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ needs.build-push.outputs.image_tag }}"
          gcloud run services update drts-api \
            --region "$REGION" \
            --image  "$IMAGE" \
            --project "$PROJECT_ID" \
          || gcloud run deploy drts-api \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3001 \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-secrets "DATABASE_URL=drts-staging-db-url:latest,API_KEY_SALT=drts-staging-api-key-salt:latest,JWT_SECRET=drts-staging-jwt-secret:latest" \
            --set-env-vars "NODE_ENV=production,API_PORT=3001" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --project "$PROJECT_ID"

      - name: Get API URL
        id: api_url
        run: |
          URL=$(gcloud run services describe drts-api \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # tenant-portal-web deploy step removed — RETIRED (SUNSET-001-tenant-portal-web, FBP-007).

      - name: Deploy — platform-admin-web
        run: |
          IMAGE="${{ env.REGISTRY }}/platform-admin-web:${{ needs.build-push.outputs.image_tag }}"
          gcloud run deploy drts-platform-admin-web \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3002 \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-env-vars "NODE_ENV=production,PORT=3002,NEXT_PUBLIC_API_URL=${{ steps.api_url.outputs.url }}" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --project "$PROJECT_ID"

      - name: Deploy — ops-console-web
        run: |
          IMAGE="${{ env.REGISTRY }}/ops-console-web:${{ needs.build-push.outputs.image_tag }}"
          gcloud run deploy drts-ops-console-web \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3003 \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}" \
            --set-env-vars "NODE_ENV=production,PORT=3003,NEXT_PUBLIC_API_URL=${{ steps.api_url.outputs.url }}" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --project "$PROJECT_ID"

  # ──────────────────────────────────────────────────────────────
  # 4. Health check — verify /health returns 200
  # ──────────────────────────────────────────────────────────────
  health-check:
    name: API health check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get API URL
        id: api_url
        run: |
          URL=$(gcloud run services describe drts-api \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Wait for /health to return 200
        env:
          HEALTH_URL: ${{ steps.api_url.outputs.url }}/health
        run: |
          echo "Polling $HEALTH_URL ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            echo "  attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 240s." >&2
          exit 1

      - name: Print staging URLs
        run: |
          echo "=== Staging deployment complete ==="
          for SVC in drts-api drts-platform-admin-web drts-ops-console-web; do
            URL=$(gcloud run services describe "$SVC" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format "value(status.url)" 2>/dev/null || echo "(not found)")
            echo "  $SVC: $URL"
          done
