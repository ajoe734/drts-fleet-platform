name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migration:
        description: "Skip DB migration step (use only if migrations already applied)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

concurrency:
  group: deploy-staging
  cancel-in-progress: false # serialise deploys; never cancel a running migration

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/drts
  CLOUDSQL: ${{ vars.GCP_CLOUDSQL_INSTANCE }}
  DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
  RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Build & push all images to Artifact Registry
  # ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Validate staging GitHub config
        env:
          WIF_PROVIDER_VALUE: ${{ secrets.WIF_PROVIDER }}
          RUNTIME_SERVICE_ACCOUNT_FALLBACK: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${PROJECT_ID:-}" ]] || missing+=("vars.GCP_PROJECT_ID")
          [[ -n "${REGION:-}" ]] || missing+=("vars.GCP_REGION")
          [[ -n "${CLOUDSQL:-}" ]] || missing+=("vars.GCP_CLOUDSQL_INSTANCE")
          [[ -n "${WIF_PROVIDER_VALUE:-}" ]] || missing+=("secrets.WIF_PROVIDER")
          [[ -n "${DEPLOYER_SERVICE_ACCOUNT:-}" ]] || missing+=("secrets.WIF_SERVICE_ACCOUNT")
          if [[ -z "${RUNTIME_SERVICE_ACCOUNT:-${RUNTIME_SERVICE_ACCOUNT_FALLBACK:-}}" ]]; then
            missing+=("vars.GCP_RUNTIME_SERVICE_ACCOUNT or secrets.GCP_RUNTIME_SERVICE_ACCOUNT")
          fi

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing GitHub Actions staging configuration: ${missing[*]}."
            echo "::error::Configure the required repo variables/secrets before rerunning Deploy — Staging."
            exit 1
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API ──────────────────────────────────────────────────
      - name: Build & push — api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/api:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/api:cache,mode=max

      # ── Migrate image ────────────────────────────────────────
      - name: Build & push — migrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/migrate:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/migrate:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/migrate:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/migrate:cache,mode=max

      # ── Web apps ─────────────────────────────────────────────
      # tenant-portal-web: RETIRED (SUNSET-001-tenant-portal-web, FBP-007).
      # Production tenant UI is tenant-commute-hub (external repo).
      # Build step removed from active pipeline.

      - name: Build & push — platform-admin-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/platform-admin-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/platform-admin-web:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/platform-admin-web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/platform-admin-web:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/platform-admin-web:cache,mode=max

      - name: Build & push — ops-console-web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ops-console-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ops-console-web:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/ops-console-web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/ops-console-web:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/ops-console-web:cache,mode=max

  # ──────────────────────────────────────────────────────────────
  # 2. Run DB migrations via Cloud Run Job
  # ──────────────────────────────────────────────────────────────
  migrate:
    name: DB migration
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ inputs.skip_migration != 'true' }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve Cloud Run runtime service account
        id: runtime_sa
        env:
          RUNTIME_SERVICE_ACCOUNT_FALLBACK: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          RUNTIME_SA="${RUNTIME_SERVICE_ACCOUNT:-${RUNTIME_SERVICE_ACCOUNT_FALLBACK:-}}"
          if [[ -z "$RUNTIME_SA" ]]; then
            echo "::error::Missing Cloud Run runtime identity. Set vars.GCP_RUNTIME_SERVICE_ACCOUNT (preferred) or secret GCP_RUNTIME_SERVICE_ACCOUNT to a service account with roles/cloudsql.client and roles/secretmanager.secretAccessor."
            exit 1
          fi
          if [[ "$RUNTIME_SA" == "$DEPLOYER_SERVICE_ACCOUNT" ]]; then
            echo "::error::Cloud Run runtime identity resolves to the GitHub WIF deployer service account. Configure a separate runtime service account with roles/cloudsql.client and roles/secretmanager.secretAccessor."
            exit 1
          fi
          ACT_AS_PERMISSIONS="$(gcloud iam service-accounts test-iam-permissions "$RUNTIME_SA" \
            --project "$PROJECT_ID" \
            --permissions iam.serviceAccounts.actAs \
            --format='csv[no-heading](permissions)' \
            2>/dev/null || true)"
          if [[ "$ACT_AS_PERMISSIONS" != *"iam.serviceAccounts.actAs"* ]]; then
            echo "::warning::test-iam-permissions could not confirm iam.serviceAccounts.actAs on ${RUNTIME_SA} — proceeding anyway (roles/iam.serviceAccountUser is granted at project level)."
          fi

          echo "email=$RUNTIME_SA" >> "$GITHUB_OUTPUT"

      - name: Create / update migration job definition
        run: |
          IMAGE="${{ env.REGISTRY }}/migrate:${{ needs.build-push.outputs.image_tag }}"
          # Upsert the Cloud Run Job with the new image; remaining config comes from migrate-job.yaml.
          gcloud run jobs update drts-migrate \
            --region "$REGION" \
            --image  "$IMAGE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ steps.runtime_sa.outputs.email }}" \
            --set-secrets "DATABASE_URL=drts-staging-db-url:latest" \
            --max-retries 0 \
            --project "$PROJECT_ID" \
          || gcloud run jobs create drts-migrate \
            --region "$REGION" \
            --image  "$IMAGE" \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ steps.runtime_sa.outputs.email }}" \
            --set-secrets "DATABASE_URL=drts-staging-db-url:latest" \
            --max-retries 0 \
            --project "$PROJECT_ID"

      - name: Execute migration job and wait for completion
        run: |
          set -euo pipefail

          if gcloud run jobs execute drts-migrate \
            --region  "$REGION" \
            --wait    \
            --project "$PROJECT_ID"; then
            exit 0
          fi

          echo "::error::drts-migrate execution failed. Capturing latest execution metadata for triage."
          EXECUTION_NAME="$(gcloud run jobs describe drts-migrate \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.latestCreatedExecution.name)' \
            2>/dev/null || true)"

          if [[ -n "$EXECUTION_NAME" ]]; then
            echo "Latest execution: $EXECUTION_NAME"
            gcloud run jobs executions describe "$EXECUTION_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format='yaml(metadata.name,status.startTime,status.completionTime,status.logUri,status.conditions,status.failedCount,status.runningCount,status.succeededCount)' \
              || true
            gcloud run jobs executions tasks list \
              --execution="$EXECUTION_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format='yaml(metadata.name,status.conditions,status.lastAttemptResult,status.logUri)' \
              || true

            FAILED_TASK="$(gcloud run jobs executions tasks list \
              --execution="$EXECUTION_NAME" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --filter='status.conditions.type=Completed AND status.conditions.status=False' \
              --format='value(metadata.name)' \
              2>/dev/null | head -n 1 || true)"

            if [[ -n "$FAILED_TASK" ]]; then
              echo "Failed task: $FAILED_TASK"
              gcloud run jobs executions tasks describe "$FAILED_TASK" \
                --region "$REGION" \
                --project "$PROJECT_ID" \
                --format='yaml(metadata.name,status.conditions,status.lastAttemptResult,status.logUri)' \
                || true
            fi

            echo "Cloud Run execution logs (best effort):"
            gcloud logging read \
              "resource.type=\"cloud_run_job\" AND resource.labels.job_name=\"drts-migrate\" AND resource.labels.location=\"${REGION}\" AND labels.\"run.googleapis.com/execution_name\"=\"${EXECUTION_NAME}\"" \
              --project "$PROJECT_ID" \
              --order=asc \
              --limit 200 \
              --format='table(timestamp,severity,textPayload,jsonPayload.message)' \
              || true
          else
            echo "Unable to resolve status.latestCreatedExecution.name for drts-migrate." >&2
          fi

          exit 1

  # ──────────────────────────────────────────────────────────────
  # 3. Deploy Cloud Run services
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy services
    runs-on: ubuntu-latest
    needs: [build-push, migrate]
    # Run deploy even when migration is skipped (migrate job is skipped, not failed)
    if: ${{ always() && needs.build-push.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve Cloud Run runtime service account
        id: runtime_sa
        env:
          RUNTIME_SERVICE_ACCOUNT_FALLBACK: ${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          RUNTIME_SA="${RUNTIME_SERVICE_ACCOUNT:-${RUNTIME_SERVICE_ACCOUNT_FALLBACK:-}}"
          if [[ -z "$RUNTIME_SA" ]]; then
            echo "::error::Missing Cloud Run runtime identity. Set vars.GCP_RUNTIME_SERVICE_ACCOUNT (preferred) or secret GCP_RUNTIME_SERVICE_ACCOUNT to a service account with roles/cloudsql.client and roles/secretmanager.secretAccessor."
            exit 1
          fi
          if [[ "$RUNTIME_SA" == "$DEPLOYER_SERVICE_ACCOUNT" ]]; then
            echo "::error::Cloud Run runtime identity resolves to the GitHub WIF deployer service account. Configure a separate runtime service account with roles/cloudsql.client and roles/secretmanager.secretAccessor."
            exit 1
          fi
          ACT_AS_PERMISSIONS="$(gcloud iam service-accounts test-iam-permissions "$RUNTIME_SA" \
            --project "$PROJECT_ID" \
            --permissions iam.serviceAccounts.actAs \
            --format='csv[no-heading](permissions)' \
            2>/dev/null || true)"
          if [[ "$ACT_AS_PERMISSIONS" != *"iam.serviceAccounts.actAs"* ]]; then
            echo "::warning::test-iam-permissions could not confirm iam.serviceAccounts.actAs on ${RUNTIME_SA} — proceeding anyway (roles/iam.serviceAccountUser is granted at project level)."
          fi

          echo "email=$RUNTIME_SA" >> "$GITHUB_OUTPUT"

      - name: Resolve Cloud Run auth exposure flags
        id: exposure
        env:
          API_ALLOW_UNAUTHENTICATED: ${{ vars.STAGING_API_ALLOW_UNAUTHENTICATED }}
          PLATFORM_ADMIN_ALLOW_UNAUTHENTICATED: ${{ vars.STAGING_PLATFORM_ADMIN_ALLOW_UNAUTHENTICATED }}
          OPS_CONSOLE_ALLOW_UNAUTHENTICATED: ${{ vars.STAGING_OPS_CONSOLE_ALLOW_UNAUTHENTICATED }}
        run: |
          set -euo pipefail

          resolve_flag() {
            local raw="${1:-}"
            local default_value="${2:-true}"
            local normalized="${raw:-$default_value}"
            normalized="$(echo "$normalized" | tr '[:upper:]' '[:lower:]')"
            case "$normalized" in
              true|1|yes|y) echo "--allow-unauthenticated" ;;
              false|0|no|n) echo "--no-allow-unauthenticated" ;;
              *)
                echo "::error::Invalid Cloud Run exposure flag: ${raw}. Use true/false."
                exit 1
                ;;
            esac
          }

          echo "api=$(resolve_flag "${API_ALLOW_UNAUTHENTICATED:-}" true)" >> "$GITHUB_OUTPUT"
          echo "platform_admin=$(resolve_flag "${PLATFORM_ADMIN_ALLOW_UNAUTHENTICATED:-}" true)" >> "$GITHUB_OUTPUT"
          echo "ops_console=$(resolve_flag "${OPS_CONSOLE_ALLOW_UNAUTHENTICATED:-}" true)" >> "$GITHUB_OUTPUT"

      - name: Resolve control-plane staging endpoints
        id: control_plane
        env:
          CONTROL_PLANE_API_ORIGIN: ${{ vars.STAGING_CONTROL_PLANE_API_ORIGIN }}
          STAGING_IAP_CLIENT_ID: ${{ vars.STAGING_IAP_CLIENT_ID }}
        run: |
          set -euo pipefail

          api_origin="${CONTROL_PLANE_API_ORIGIN:-https://api.staging.drts-fleet.cctech-support.com}"
          iap_client_id="${STAGING_IAP_CLIENT_ID:-1071409254673-nabnvfu9hr89s1acue6fcfoomn9g1v5k.apps.googleusercontent.com}"

          echo "api_origin=${api_origin}" >> "$GITHUB_OUTPUT"
          echo "iap_client_id=${iap_client_id}" >> "$GITHUB_OUTPUT"

      - name: Resolve API secret mounts
        id: api_secrets
        run: |
          set -euo pipefail

          secret_args="DATABASE_URL=drts-staging-db-url:latest,API_KEY_SALT=drts-staging-api-key-salt:latest,JWT_SECRET=drts-staging-jwt-secret:latest"

          if gcloud secrets describe drts-staging-internal-key --project "$PROJECT_ID" >/dev/null 2>&1; then
            secret_args="${secret_args},DRTS_INTERNAL_KEY=drts-staging-internal-key:latest"
            echo "::notice::Including optional DRTS_INTERNAL_KEY secret in drts-api deploy."
          else
            echo "::warning::Optional secret drts-staging-internal-key not found; deploying drts-api without DRTS_INTERNAL_KEY."
          fi

          printf 'api=%s\n' "$secret_args" >> "$GITHUB_OUTPUT"

      - name: Deploy — api
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ needs.build-push.outputs.image_tag }}"
          # Use deploy for both create and update so the runtime identity, Cloud SQL
          # binding, and secret mounts are re-applied on every release.
          gcloud run deploy drts-api \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3001 \
            --ingress internal-and-cloud-load-balancing \
            --set-cloudsql-instances "$CLOUDSQL" \
            --service-account "${{ steps.runtime_sa.outputs.email }}" \
            --set-secrets "${{ steps.api_secrets.outputs.api }}" \
            --set-env-vars "NODE_ENV=production,API_PORT=3001" \
            ${{ steps.exposure.outputs.api }} \
            --min-instances 0 \
            --max-instances 3 \
            --project "$PROJECT_ID"

      - name: Get API URL
        id: api_url
        run: |
          URL=$(gcloud run services describe drts-api \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # tenant-portal-web deploy step removed — RETIRED (SUNSET-001-tenant-portal-web, FBP-007).

      - name: Deploy — platform-admin-web
        run: |
          IMAGE="${{ env.REGISTRY }}/platform-admin-web:${{ needs.build-push.outputs.image_tag }}"
          gcloud run deploy drts-platform-admin-web \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3002 \
            --ingress internal-and-cloud-load-balancing \
            --service-account "${{ steps.runtime_sa.outputs.email }}" \
            --set-env-vars "NODE_ENV=production,DRTS_API_URL=${{ steps.api_url.outputs.url }},NEXT_PUBLIC_API_URL=/control-plane-proxy" \
            ${{ steps.exposure.outputs.platform_admin }} \
            --min-instances 0 \
            --max-instances 2 \
            --project "$PROJECT_ID"

      - name: Deploy — ops-console-web
        run: |
          IMAGE="${{ env.REGISTRY }}/ops-console-web:${{ needs.build-push.outputs.image_tag }}"
          gcloud run deploy drts-ops-console-web \
            --region "$REGION" \
            --image  "$IMAGE" \
            --port   3003 \
            --ingress internal-and-cloud-load-balancing \
            --service-account "${{ steps.runtime_sa.outputs.email }}" \
            --set-env-vars "NODE_ENV=production,DRTS_API_URL=${{ steps.api_url.outputs.url }},NEXT_PUBLIC_API_URL=/control-plane-proxy" \
            ${{ steps.exposure.outputs.ops_console }} \
            --min-instances 0 \
            --max-instances 2 \
            --project "$PROJECT_ID"

  # ──────────────────────────────────────────────────────────────
  # 4. Health check — verify Cloud Run service reaches Ready state
  # ──────────────────────────────────────────────────────────────
  health-check:
    name: API health check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Resolve protected staging auth endpoints
        id: control_plane
        env:
          CONTROL_PLANE_API_ORIGIN: ${{ vars.STAGING_CONTROL_PLANE_API_ORIGIN }}
          STAGING_IAP_CLIENT_ID: ${{ vars.STAGING_IAP_CLIENT_ID }}
        run: |
          set -euo pipefail

          api_origin="${CONTROL_PLANE_API_ORIGIN:-https://api.staging.drts-fleet.cctech-support.com}"
          iap_client_id="${STAGING_IAP_CLIENT_ID:-1071409254673-nabnvfu9hr89s1acue6fcfoomn9g1v5k.apps.googleusercontent.com}"

          echo "api_origin=${api_origin}" >> "$GITHUB_OUTPUT"
          echo "iap_client_id=${iap_client_id}" >> "$GITHUB_OUTPUT"

      - name: Wait for service to be Ready
        run: |
          echo "Waiting for drts-api Cloud Run service to reach Ready=True ..."
          for i in $(seq 1 24); do
            READY=$(gcloud run services describe drts-api \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format "value(status.conditions[0].status)" 2>/dev/null || true)
            echo "  attempt $i: Ready=$READY"
            if [ "$READY" = "True" ]; then
              echo "Service is ready."
              exit 0
            fi
            sleep 10
          done
          echo "Service did not reach Ready state after 240s." >&2
          gcloud run services describe drts-api \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --format "yaml(status)" || true
          exit 1

      - name: Verify IAP-protected control-plane API
        env:
          DRTS_GCP_PROJECT_ID: ${{ env.PROJECT_ID }}
          DRTS_STAGING_IAP_CLIENT_ID: ${{ steps.control_plane.outputs.iap_client_id }}
          DRTS_STAGING_TOKEN_SERVICE_ACCOUNT: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          CONTROL_PLANE_API_ORIGIN: ${{ steps.control_plane.outputs.api_origin }}
        run: |
          set -euo pipefail

          TOKEN="$(./scripts/print-staging-iap-token.sh)"

          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${TOKEN}" \
            "${CONTROL_PLANE_API_ORIGIN}/health" >/dev/null

          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-actor-type: platform_admin" \
            -H "x-actor-id: deploy-health-platform-admin" \
            -H "x-realm: platform" \
            "${CONTROL_PLANE_API_ORIGIN}/api/identity/context" >/dev/null

      - name: Print staging URLs
        run: |
          echo "=== Staging deployment complete ==="
          for SVC in drts-api drts-platform-admin-web drts-ops-console-web; do
            URL=$(gcloud run services describe "$SVC" \
              --region "$REGION" \
              --project "$PROJECT_ID" \
              --format "value(status.url)" 2>/dev/null || echo "(not found)")
            echo "  $SVC: $URL"
          done
          echo "  protected-api-host: ${{ steps.control_plane.outputs.api_origin }}"
