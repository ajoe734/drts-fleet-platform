name: drts-fleet-platform-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: drts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drts_fleet_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: drts-redis
    restart: unless-stopped
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:v1.27.0
    container_name: drts-mailpit
    restart: unless-stopped
    ports:
      - "${DEV_INFRA_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${DEV_INFRA_BIND_ADDRESS:-127.0.0.1}:${MAILPIT_HTTP_PORT:-8025}:8025"

volumes:
  postgres-data:
  redis-data:
